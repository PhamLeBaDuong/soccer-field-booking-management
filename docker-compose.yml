# Full self-hosted stack: Postgres + API + web in one command.
#   docker compose up --build -d
# Reachable on localhost via the ports below.
# Config values live in a local .env file — see .env.example.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: soccer_booking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build: ./server
    image: soccer-server
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/soccer_booking?schema=public"
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me}
      PORT: "5000"
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      # Cleanup is now handled by the separate `worker` service below.
      CLEANUP_ENABLED: "false"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Background cleanup sweep — same image as `server`, but runs only the worker
  # entrypoint (node src/worker.js). One codebase, two cooperating containers:
  # your first step out of the monolith toward a distributed setup.
  worker:
    build: ./server
    image: soccer-server
    command: ["node", "src/worker.js"]
    environment:
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/soccer_booking?schema=public"
      CLEANUP_INTERVAL_MIN: ${CLEANUP_INTERVAL_MIN:-30}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── Catalog service ── fields + venues, extracted from the monolith. Same
  # image, different entrypoint (node src/service.js, SERVICE=catalog). No host
  # port — it's an internal service, reachable only through the gateway.
  catalog:
    build: ./server
    image: soccer-server
    command: ["node", "src/service.js"]
    environment:
      SERVICE: catalog
      PORT: "5000"
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/soccer_booking?schema=public"
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-change-me}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── API Gateway ── single entry point. Routes /api/fields + /api/venues to
  # catalog, everything else to the monolith. Makes extraction invisible to the
  # frontend (the strangler-fig pattern).
  gateway:
    image: nginx:1.27-alpine
    volumes:
      - ./gateway/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - server
      - catalog
    restart: unless-stopped

  web:
    build:
      context: ./client
      args:
        # Browser now talks to the GATEWAY, not the monolith directly.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  pgdata:
