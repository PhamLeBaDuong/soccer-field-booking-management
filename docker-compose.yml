# Local full-stack test: Postgres + API in one command.
#   docker compose up --build
# API → http://localhost:5000   DB → localhost:5432
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: soccer_booking
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/soccer_booking?schema=public"
      JWT_SECRET: "local-dev-secret-change-me"
      PORT: "5000"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
