name: CI

on:
  push:
    branches: [main, deploy]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend: type-check + build ──────────────────────────────────────────────
  frontend:
    name: Frontend (Next.js build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client/web

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Use mock data so the build never needs a live backend
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_PUBLIC_USE_MOCK: "true"

  # ── Backend: install + generate Prisma client ─────────────────────────────────
  backend:
    name: Backend (Node.js install + Prisma generate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema=src/prisma/schema.prisma
