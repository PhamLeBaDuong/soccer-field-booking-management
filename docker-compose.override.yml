# Local testing only. Docker Compose auto-loads this on top of docker-compose.yml
# and publishes ports so you can reach the stack on localhost. It is NOT used in
# the Cloudflare deploy (there you'd run with `-f docker-compose.yml` only, or
# just delete/rename this file on the server).
services:
  web:
    ports:
      - "3000:3000"
  server:
    ports:
      - "5000:5000"
  db:
    ports:
      - "5432:5432"
