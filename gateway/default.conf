# API Gateway routing. Mounted into the nginx container at
# /etc/nginx/conf.d/default.conf. This is the single public entry point; it
# decides which backend container serves each path (the strangler-fig pattern).
upstream monolith { server server:5000; }
upstream catalog  { server catalog:5000; }

# Needed so Socket.io's WebSocket upgrade is proxied correctly.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;

    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── Extracted to the catalog service ──
    location /api/fields { proxy_pass http://catalog; }
    location /api/venues { proxy_pass http://catalog; }

    # ── Socket.io (real-time still lives on the monolith) ──
    location /socket.io/ {
        proxy_pass http://monolith;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Everything else still goes to the monolith ──
    location / { proxy_pass http://monolith; }
}
